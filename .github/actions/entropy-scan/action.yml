name: "fixentropy-scan-action"
description: "A Github action to scan code with fixentropy.io"
author: "fixentropy-io"

inputs:
  asserter:
    description: "The asserter to use <org>/<asserter>"
    required: false
  from:
    description: "The path to scan"
    required: true
  github-token:
    description: "GitHub token for authentication"
    required: true
  backend-url:
    description: "The fixentropy backend URL"
    required: false
    default: "https://app.fixentropy.io/api"

permissions:
  id-token: write
  contents: read

runs:
  using: "composite"
  steps:
    - name: Get OIDC Token
      id: oidc
      uses: actions/github-script@v7
      with:
        script: |
          const token = await core.getIDToken("fixentropy");
          core.setOutput("token", token);

    - name: Dagger call run-scan
      uses: dagger/dagger-for-github@v8.2.0
      with:
        module: ${{ github.action_path }}
        call: >-
          run-pipeline
          --from "${{ inputs.from }}"
          --asserter "${{ inputs.asserter }}"
          --grapher
          --github-token env:GITHUB_TOKEN
          --oidc-token env:OIDC_TOKEN
          --backend-url "${{ inputs.backend-url }}"
          --source ${{ github.workspace }}
        version: latest
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OIDC_TOKEN: ${{ steps.oidc.outputs.token }}