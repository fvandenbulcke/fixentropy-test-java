name: Try Action

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Maven
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install

      - name: Dragee Scan
        uses: dragee-io/dragee-scan-action@v1
        with:
          from: './target/dragee/'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAGEE_TOKEN: ${{ secrets.DRAGEE_TOKEN }}
