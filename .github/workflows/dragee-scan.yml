name: Try Action

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FIXENTROPY_BACKEND_URL: "https://app.fixentropy.io/api"

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Maven
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'

      - name: Install Maven (Ubuntu)
        shell: bash
        run: |
          if command -v mvn >/dev/null 2>&1; then
            echo "Maven already installed"
          else
            if command -v apt-get >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y maven
              else
                apt-get update
                apt-get install -y maven
              fi
            else
              echo "apt-get not found on this runner. Please install Maven for this OS."
              exit 1
            fi
          fi

      - name: Build with Maven
        run: mvn clean install

      - name: Fixentropy Scan
#        uses: fixentropy-io/entropy-scan-action@v1
        uses: "./.github/actions/entropy-scan"
        with:
          from: '/target/fixentropy/'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          backend-url: ${{ env.FIXENTROPY_BACKEND_URL }}
